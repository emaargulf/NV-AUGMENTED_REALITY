<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>HungerStation Kitchens · Interactive AR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --y: #FFD000; --dark: #111; --white: #fff; }
    body { overflow: hidden; background: var(--dark); font-family: 'Nunito', sans-serif; touch-action: none; }

    /* ── OVERLAY ── */
    #overlay {
      position: fixed; inset: 0; z-index: 20;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--dark);
      transition: opacity 0.5s ease;
    }
    #overlay.gone { opacity: 0; pointer-events: none; }

    .ov-logo {
      width: 156px; height: 120px; border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 22px; animation: breathe 3s ease-in-out infinite; overflow: hidden;
    }
    @keyframes breathe {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,208,0,.5); }
      50%      { box-shadow: 0 0 0 22px rgba(255,208,0,0);  }
    }
    .ov-logo img { width: 100%; height: 100%; object-fit: contain; }
    .ov-title { font-size: 27px; font-weight: 900; color: var(--white); letter-spacing: -.5px; margin-bottom: 4px; }
    .ov-sub   { font-size: 12px; font-weight: 700; color: var(--y); letter-spacing: .2em; text-transform: uppercase; margin-bottom: 38px; }

    .scan-box { width: 200px; height: 200px; position: relative; margin-bottom: 30px; }
    .scan-box::before,.scan-box::after,.scan-box .c3,.scan-box .c4 {
      content:''; position:absolute; width:30px; height:30px; border:3px solid var(--y);
    }
    .scan-box::before { top:0;left:0; border-right:none;border-bottom:none;border-radius:4px 0 0 0; }
    .scan-box::after  { top:0;right:0; border-left:none; border-bottom:none;border-radius:0 4px 0 0; }
    .scan-box .c3     { bottom:0;left:0;border-right:none;border-top:none; border-radius:0 0 0 4px; }
    .scan-box .c4     { bottom:0;right:0;border-left:none;border-top:none; border-radius:0 0 4px 0; }

    .scan-beam {
      position:absolute; left:0;right:0; height:2px;
      background:linear-gradient(90deg,transparent,var(--y),transparent);
      box-shadow:0 0 10px 2px rgba(255,208,0,.5);
      animation:beam 2.2s ease-in-out infinite;
    }
    @keyframes beam { 0% { top:8px; opacity:0; } 8% { opacity:1; } 92% { opacity:1; } 100%{ top:calc(100% - 8px); opacity:0; } }

    #status {
      font-family:'Space Mono',monospace; font-size:11px; font-weight:700;
      letter-spacing:.12em; text-transform:uppercase; color:rgba(255,208,0,.45); transition:color .4s;
    }
    #status.ready { color:#4ade80; }

    /* ── HUD ── */
    #hud { position:fixed;inset:0;z-index:15;pointer-events:none;opacity:0;transition:opacity .5s ease; }
    #hud.show { opacity:1; }
    .hud-top { position:absolute;top:0;left:0;right:0;padding:16px 18px;display:flex;align-items:center;justify-content:space-between; }
    .hud-chip { background:var(--y);border-radius:10px;padding:6px 14px; display:flex;align-items:center;gap:8px; }
    .hud-chip img { width:34px;height:26px;object-fit:contain; }
    .hud-chip-lbl { font-size:11px;font-weight:900;color:var(--dark);letter-spacing:.06em;text-transform:uppercase; }
    .hud-badge { font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#4ade80;display:flex;align-items:center;gap:6px; }
    .lock-dot { width:6px;height:6px;border-radius:50%;background:#4ade80;animation:blink 1.5s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:.2} }
    a-scene { z-index:1; }

    /* Interaction Feedback */
    #toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: #4ade80; color: #111; font-weight: 900; padding: 12px 24px;
      border-radius: 8px; opacity: 0; transition: opacity 0.3s; z-index: 999;
      font-family: 'Nunito', sans-serif; text-transform: uppercase; letter-spacing: 1px;
    }
  </style>

  <!-- Custom Pinch-to-Zoom Gesture Engine -->
  <script>
    AFRAME.registerComponent('gesture-handler', {
      schema: { minScale: { default: 0.5 }, maxScale: { default: 3.0 } },
      init: function () {
        this.initialScale = this.el.object3D.scale.clone();
        this.scaleFactor = 1;
        let touchStartDistance = 0;

        document.addEventListener('touchstart', (e) => {
          if (e.touches.length === 2) {
            const dx = e.touches[0].pageX - e.touches[1].pageX;
            const dy = e.touches[0].pageY - e.touches[1].pageY;
            touchStartDistance = Math.sqrt(dx * dx + dy * dy);
          }
        });

        document.addEventListener('touchmove', (e) => {
          if (e.touches.length === 2) {
            const dx = e.touches[0].pageX - e.touches[1].pageX;
            const dy = e.touches[0].pageY - e.touches[1].pageY;
            const touchCurrentDistance = Math.sqrt(dx * dx + dy * dy);
            const scaleMultiplier = touchCurrentDistance / touchStartDistance;
            
            this.scaleFactor *= scaleMultiplier;
            this.scaleFactor = Math.max(this.data.minScale, Math.min(this.data.maxScale, this.scaleFactor));
            
            this.el.object3D.scale.set(
              this.initialScale.x * this.scaleFactor,
              this.initialScale.y * this.scaleFactor,
              this.initialScale.z * this.scaleFactor
            );
            touchStartDistance = touchCurrentDistance;
          }
        });
      }
    });
  </script>
</head>
<body>

<div id="overlay">
  <div class="ov-logo">
    <img src="./assets/logo.png" onerror="this.style.display='none'">
  </div>
  <div class="ov-title">HungerStation</div>
  <div class="ov-sub">Kitchens · AR Experience</div>
  <div class="scan-box">
    <div class="c3"></div><div class="c4"></div>
    <div class="scan-beam"></div>
    <div class="scan-icon">📷</div>
  </div>
  <div id="status">Initializing camera…</div>
</div>

<div id="hud">
  <div class="hud-top">
    <div class="hud-chip">
      <img src="./assets/logo.png" onerror="this.style.display='none'">
      <span class="hud-chip-lbl">Kitchens</span>
    </div>
    <div class="hud-badge"><div class="lock-dot"></div> Tracking</div>
  </div>
</div>

<div id="toast">Item Added to Cart!</div>

<a-scene
  id="scene"
  mindar-image="imageTargetSrc: https://emaargulf.github.io/NV-AUGMENTED_REALITY/HUNGER_STATION_KITCHENS/assets/targets_2.mind; autoStart: true; filterMinCF: 0.0001; filterBeta: 0.001;"
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-assets>
    <img id="ar-logo" src="./assets/logo.png" crossorigin="anonymous">
    <img id="ar-car"  src="./assets/car.png" crossorigin="anonymous">
    <img id="ar-bike" src="./assets/bike.png" crossorigin="anonymous">
  </a-assets>

  <!-- Added Raycaster for Touch Events -->
  <a-camera position="0 0 0" look-controls="enabled: false" cursor="rayOrigin: mouse;" raycaster="objects: .clickable"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0" id="anchor">
    
    <!-- Wrapper Entity that handles the Pinch-to-Zoom scaling -->
    <a-entity id="zoom-wrapper" gesture-handler>

        <a-plane position="0 0 0.002" width="1.05" height="1.05" color="#FFD000" material="transparent:true;opacity:0.06" animation="property:components.material.material.opacity;to:0.13;dir:alternate;dur:2400;loop:true;easing:easeInOutSine"></a-plane>

        <a-image src="#ar-logo" position="0 0.54 0.1" width="0.52" height="0.40" material="alphaTest:0.1;transparent:true" animation="property:position;to:0 0.565 0.1;dir:alternate;dur:2800;loop:true;easing:easeInOutSine"></a-image>

        <!-- Added 'clickable' class to dishes so they can be tapped -->
        <a-entity position="-0.28 0.17 0.18" animation__y="property:position;to:-0.28 0.22 0.22;dir:alternate;dur:2800;loop:true;easing:easeInOutSine">
          <a-image class="dish clickable" width="0.27" height="0.27" material="alphaTest:0.45;transparent:true"></a-image>
        </a-entity>

        <a-entity position="0.28 0.17 0.18" animation__y="property:position;to:0.28 0.12 0.24;dir:alternate;dur:3400;loop:true;easing:easeInOutSine">
          <a-image class="dish clickable" width="0.27" height="0.27" material="alphaTest:0.45;transparent:true"></a-image>
        </a-entity>

        <a-entity position="-0.28 -0.18 0.2" animation__y="property:position;to:-0.28 -0.13 0.26;dir:alternate;dur:3800;loop:true;easing:easeInOutSine">
          <a-image class="dish clickable" width="0.27" height="0.27" material="alphaTest:0.45;transparent:true"></a-image>
        </a-entity>

        <a-entity position="0.28 -0.18 0.15" animation__y="property:position;to:0.28 -0.13 0.22;dir:alternate;dur:3000;loop:true;easing:easeInOutSine">
          <a-image class="dish clickable" width="0.27" height="0.27" material="alphaTest:0.45;transparent:true"></a-image>
        </a-entity>

        <!-- Hero center dish -->
        <a-entity position="0 -0.01 0.3" animation__y="property:position;to:0 0.05 0.38;dir:alternate;dur:2200;loop:true;easing:easeInOutSine">
          <a-image class="dish clickable" id="hero-dish" width="0.35" height="0.35" material="alphaTest:0.45;transparent:true"></a-image>
          <a-ring position="0 0 -0.02" radius-inner="0.18" radius-outer="0.195" color="#FFD000" material="transparent:true;opacity:0.55;side:double" animation="property:rotation;to:0 0 360;dur:5000;loop:true;easing:linear"></a-ring>
        </a-entity>

        <a-plane position="0 -0.53 0.07" width="1.1" height="0.003" color="#FFD000" material="shader:flat;transparent:true;opacity:0.3"></a-plane>
        <a-plane position="0 -0.65 0.07" width="1.1" height="0.002" color="#FFD000" material="shader:flat;transparent:true;opacity:0.18"></a-plane>

        <a-image src="#ar-car" position="-1.1 -0.45 0.1" width="0.335" height="0.291" material="alphaTest:0.15;transparent:true" animation="property:position;from:-1.1 -0.45 0.1;to:1.1 -0.45 0.1;dur:5500;loop:true;easing:linear"></a-image>
        <a-image src="#ar-bike" position="-0.5 -0.558 0.09" width="0.325" height="0.282" material="alphaTest:0.15;transparent:true" animation="property:position;from:-0.5 -0.558 0.09;to:1.2 -0.558 0.09;dur:3800;loop:true;easing:linear"></a-image>
        <a-image src="#ar-bike" position="-1.35 -0.558 0.09" width="0.325" height="0.282" material="alphaTest:0.15;transparent:true" animation="property:position;from:-1.35 -0.558 0.09;to:1.2 -0.558 0.09;dur:3800;loop:true;easing:linear;delay:1900"></a-image>

        <!-- Interactive CTA Button -->
        <a-entity position="0 -0.76 0.08" class="clickable" id="cta-button" animation__scale="property: scale; to: 1.05 1.05 1.05; dir: alternate; dur: 800; loop: true;">
          <a-plane width="0.42" height="0.09" color="#FFD000" material="shader:flat"></a-plane>
          <a-text value="ORDER NOW" color="#111111" align="center" font="kelsonsans" position="0 0 0.01" scale="0.36 0.36 0.36"></a-text>
        </a-entity>

    </a-entity>
  </a-entity>
</a-scene>

<script>
  const scene   = document.querySelector('#scene');
  const anchor  = document.querySelector('#anchor');
  const overlay = document.querySelector('#overlay');
  const hud     = document.querySelector('#hud');
  const status  = document.querySelector('#status');
  const toast   = document.querySelector('#toast');

  scene.addEventListener('arReady', () => {
    status.textContent = 'Point camera at the facade';
    status.classList.add('ready');
  });
  scene.addEventListener('arError', () => {
    status.textContent = 'Error — check file paths';
  });
  anchor.addEventListener('targetFound', () => {
    overlay.classList.add('gone');
    hud.classList.add('show');
  });
  anchor.addEventListener('targetLost', () => {
    overlay.classList.remove('gone');
    hud.classList.remove('show');
  });

  // ── Touch Events ──
  document.querySelector('#cta-button').addEventListener('click', () => {
    window.location.href = 'https://hungerstation.com';
  });

  // ── Dish carousel & Interaction ──
  const TOTAL  = 37;
  const dishes = Array.from(document.querySelectorAll('.dish'));
  let idx = 1;

  function nextPath() {
    const p = `./assets/food${idx}.png`;
    idx = (idx % TOTAL) + 1;
    return p;
  }

  dishes.forEach((d, i) => {
    // Initial Load
    setTimeout(() => {
      d.setAttribute('src', nextPath());
      d.setAttribute('animation__pop', 'property:scale;from:0 0 0;to:1 1 1;dur:600;easing:easeOutElastic');
    }, i * 480);

    // Click Event to "Add to Cart"
    d.addEventListener('click', () => {
      d.setAttribute('animation__spin', 'property: rotation; to: 0 360 0; dur: 800; easing: easeInOutSine');
      toast.style.opacity = '1';
      setTimeout(() => { toast.style.opacity = '0'; }, 2000);
      setTimeout(() => { d.removeAttribute('animation__spin'); }, 850);
    });
  });

  // Continuous Cycling
  setInterval(() => {
    const d = dishes[Math.floor(Math.random() * dishes.length)];
    d.setAttribute('animation__pop', 'property:scale;from:0.5 0.5 0.5;to:1 1 1;dur:600;easing:easeOutElastic');
    setTimeout(() => d.setAttribute('src', nextPath()), 60);
  }, 2800);
</script>
</body>
</html>
