<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>NV AR Facade Prototype</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
      #ui-layer {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(10, 10, 12, 0.9); z-index: 2;
        display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        color: #fff; pointer-events: none; transition: opacity 0.4s ease-out;
      }
      .hidden { opacity: 0 !important; }
      .bracket { border: 2px solid #FF9800; padding: 20px; position: relative; }
      .bracket::before, .bracket::after { content: ''; position: absolute; width: 15px; height: 15px; border: 2px solid #0055FF; }
      .bracket::before { top: -6px; left: -6px; border-right: none; border-bottom: none; }
      .bracket::after { bottom: -6px; right: -6px; border-left: none; border-top: none; }
    </style>
  </head>
  
  <body>
    <div id="ui-layer">
      <div class="bracket">
        <h3 style="margin: 0; font-size: 16px; letter-spacing: 2px; color: #FF9800;">NV ARCHITECTURE</h3>
        <p id="status-text" style="font-size: 12px; color: #0055FF; margin-top: 10px;">AWAITING VISUAL LOCK...</p>
      </div>
    </div>

    <a-scene 
      id="ar-scene"
      mindar-image="imageTargetSrc: https://emaargulf.github.io/NV-AUGMENTED_REALITY/HUNGER_STATION_KITCHENS/assets/targets.mind; autoStart: true; filterMinCF: 0.0001; filterBeta: 0.001;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights: true" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="target-anchor">
        
        <a-plane 
          position="0 0 0.02" 
          width="1.05" height="1.05" 
          color="#0055FF" 
          material="transparent: true; opacity: 0.6; wireframe: true"
          animation="property: components.material.material.opacity; to: 0.1; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine">
        </a-plane>

        <a-plane 
          position="0 -0.5 0.05" 
          width="1.2" height="0.015" 
          color="#FF9800" 
          material="shader: flat; transparent: true; opacity: 0.9"
          animation="property: position; to: 0 0.5 0.05; dir: alternate; dur: 2500; loop: true; easing: easeInOutSine">
        </a-plane>

        <a-plane position="-0.5 0.5 0.03" width="0.1" height="0.01" color="#FFFFFF" material="transparent: true" animation="property: components.material.material.opacity; to: 0.2; dir: alternate; dur: 500; loop: true"></a-plane>
        <a-plane position="-0.5 0.5 0.03" width="0.01" height="0.1" color="#FFFFFF" material="transparent: true" animation="property: components.material.material.opacity; to: 0.2; dir: alternate; dur: 500; loop: true"></a-plane>
        
        <a-plane position="0.5 -0.5 0.03" width="0.1" height="0.01" color="#FFFFFF" material="transparent: true" animation="property: components.material.material.opacity; to: 0.2; dir: alternate; dur: 500; loop: true"></a-plane>
        <a-plane position="0.5 -0.5 0.03" width="0.01" height="0.1" color="#FFFFFF" material="transparent: true" animation="property: components.material.material.opacity; to: 0.2; dir: alternate; dur: 500; loop: true"></a-plane>

        <a-text 
          value="SYS.ONLINE // KITCHEN_HUB_01" 
          color="#4CAF50" 
          position="-0.45 0.55 0.1" 
          scale="0.3 0.3 0.3"
          font="monoid"
          opacity="0.8">
        </a-text>

        <a-text 
          value="HUNGERSTATION CLOUD" 
          color="#FF9800" 
          align="center" 
          position="0 0.65 0.1" 
          scale="0.7 0.7 0.7"
          font="kelsonsans"
          animation="property: position; to: 0 0.68 0.1; dir: alternate; dur: 3000; loop: true; easing: easeInOutSine">
        </a-text>

      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('#ar-scene');
      const target = document.querySelector('#target-anchor');
      const uiLayer = document.querySelector('#ui-layer');
      const statusText = document.querySelector('#status-text');

      sceneEl.addEventListener("arReady", () => {
        statusText.innerText = "CAMERA ACTIVE. SCAN FACADE ELEVATION.";
        statusText.style.color = "#4CAF50";
      });

      target.addEventListener('targetFound', () => {
        uiLayer.classList.add('hidden');
      });

      target.addEventListener('targetLost', () => {
        uiLayer.classList.remove('hidden');
      });
    </script>
  </body>
</html>
