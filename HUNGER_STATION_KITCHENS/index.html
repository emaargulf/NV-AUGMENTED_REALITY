<!DOCTYPE html>
<!-- 
  Developer/Author: archengsafdar@gmail.com
  Project: NV WebAR Facade Prototype (Code-Only Animation)
  Stack: Vanilla HTML/JS, A-Frame, MindAR
-->
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>NV AR Facade Prototype</title>
    
    <!-- Core A-Frame 1.5.0 -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    
    <!-- MindAR Image Tracking for A-Frame -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      /* 100% Mobile Responsive UI overlay for the scanning phase */
      body { margin: 0; overflow: hidden; font-family: sans-serif; }
      #scanning-overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.7); z-index: 2;
        display: flex; justify-content: center; align-items: center; text-align: center;
        color: white; padding: 20px; pointer-events: none; transition: opacity 0.5s ease;
      }
      .hidden { opacity: 0; }
    </style>
  </head>
  
  <body>
    <!-- User Instructions Overlay -->
    <div id="scanning-overlay">
      <h2>Point camera at the NV Facade Elevation</h2>
    </div>

    <!-- 
      The AR Scene:
      - imageTargetSrc points to your compiled .mind file
      - filterMinCF & filterBeta stabilize the HTML elements so they don't jitter
    -->
    <a-scene 
      mindar-image="imageTargetSrc: ./assets/target.mind; autoStart: true; filterMinCF: 0.0001; filterBeta: 0.001;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- The Anchor: Everything inside this entity locks onto the physical image -->
      <a-entity mindar-image-target="targetIndex: 0" id="target-anchor">
        
        <!-- 
          ANIMATION LAYER 1: The "Glow" Pulse
          This plane sits slightly in front of the image (Z = 0.01) 
          It pulses HungerStation Yellow/Orange opacity from 0% to 50%.
        -->
        <a-plane 
          position="0 0 0.01" 
          width="1.2" height="1.2" 
          color="#FFC107" 
          material="transparent: true; opacity: 0;"
          animation="property: components.material.material.opacity; to: 0.5; dir: alternate; dur: 1200; loop: true; easing: easeInOutSine">
        </a-plane>

        <!-- 
          ANIMATION LAYER 2: The "Mesh" Hover
          This plane simulates the floating structural mesh. It floats forward and backward.
          (You can change the 'color' to a hex value matching your specific design).
        -->
        <a-plane 
          position="0 0 0.05" 
          width="1" height="1" 
          color="#0055FF" 
          material="transparent: true; opacity: 0.3; wireframe: true"
          animation="property: position; to: 0 0 0.15; dir: alternate; dur: 3000; loop: true; easing: easeInOutSine">
        </a-plane>

        <!-- 
          ANIMATION LAYER 3: 3D Floating Branding
          This text hovers above the building and slowly bobs up and down.
        -->
        <a-text 
          value="NV FOOD HUB" 
          color="#FFFFFF" 
          align="center" 
          position="0 0.6 0.1" 
          scale="0.8 0.8 0.8"
          animation="property: position; to: 0 0.65 0.1; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine">
        </a-text>

      </a-entity>
    </a-scene>

    <script>
      // Vanilla JS: Remove the instruction overlay exactly when the camera locks onto the image
      const target = document.querySelector('#target-anchor');
      const overlay = document.querySelector('#scanning-overlay');

      target.addEventListener('targetFound', () => {
        overlay.classList.add('hidden');
      });

      target.addEventListener('targetLost', () => {
        overlay.classList.remove('hidden');
      });
    </script>
  </body>
</html>
