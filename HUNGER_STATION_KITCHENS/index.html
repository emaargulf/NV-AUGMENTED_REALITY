<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>NV AR Facade Prototype</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body { margin: 0; overflow: hidden; font-family: sans-serif; }
      #scanning-overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.7); z-index: 2;
        display: flex; justify-content: center; align-items: center; text-align: center;
        color: white; padding: 20px; pointer-events: none; transition: opacity 0.5s ease;
      }
      .hidden { opacity: 0 !important; }
    </style>
  </head>
  
  <body>
    <div id="scanning-overlay">
      <h2>Point camera at the NV Facade Elevation</h2>
      <p style="font-size: 14px; color: #FFC107;">Waiting for camera lock...</p>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: https://emaargulf.github.io/NV-AUGMENTED_REALITY/HUNGER_STATION_KITCHENS/assets/target.mind; autoStart: true; filterMinCF: 0.0001; filterBeta: 0.001;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="target-anchor">
        
        <a-plane 
          position="0 0 0.01" 
          width="1.2" height="1.2" 
          color="#FFC107" 
          material="transparent: true; opacity: 0;"
          animation="property: components.material.material.opacity; to: 0.5; dir: alternate; dur: 1200; loop: true; easing: easeInOutSine">
        </a-plane>

        <a-plane 
          position="0 0 0.05" 
          width="1" height="1" 
          color="#0055FF" 
          material="transparent: true; opacity: 0.3; wireframe: true"
          animation="property: position; to: 0 0 0.15; dir: alternate; dur: 3000; loop: true; easing: easeInOutSine">
        </a-plane>

        <a-text 
          value="NV FOOD HUB" 
          color="#FFFFFF" 
          align="center" 
          position="0 0.6 0.1" 
          scale="0.8 0.8 0.8"
          animation="property: position; to: 0 0.65 0.1; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine">
        </a-text>

      </a-entity>
    </a-scene>

    <script>
      const target = document.querySelector('#target-anchor');
      const overlay = document.querySelector('#scanning-overlay');

      // Hide text when locked onto the image
      target.addEventListener('targetFound', () => {
        overlay.classList.add('hidden');
      });

      // Show text if camera looks away
      target.addEventListener('targetLost', () => {
        overlay.classList.remove('hidden');
      });
    </script>
  </body>
</html>
